<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Pam Tholan</title>
  <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Megrim&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>

   main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.contact-container {
  max-width: 800px;
  width: 100%;
  margin: 2rem auto;
  padding: 3rem 2rem;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 16px;
  box-shadow:
    0 10px 30px rgba(0, 0, 0, 0.45),
    0 0 24px rgba(138, 63, 252, 0.18);
  text-align: center;
}

.contact-container h1 {
  font-size: 2.75rem;
  font-family: "Megrim", cursive;
  margin-bottom: 1rem;
  color: #2EC4B6;
}

.contact-container p {
  font-size: 1.25rem;
  font-family: "Dosis", sans-serif;
  margin-bottom: 2rem;
  color: var(--text-secondary);
}

.icon-links {
  display: flex;
  justify-content: center;
  gap: 3rem;
  margin-top: 2rem;
}

.icon-links a {
  color: var(--text-primary);
  font-size: 2.5rem;
  transition: all 0.3s ease;
}

.icon-links a:hover {
  color: var(--accent-secondary);
  transform: translateY(-4px);
  text-shadow: 0 0 16px rgba(46, 196, 182, 0.5);
}

.email-copy {
  margin-top: 1.5rem;
  font-size: 0.95rem;
  font-family: "Dosis", sans-serif;
  color: var(--text-secondary);
}

#email-text {
  font-weight: bold;
  color: var(--text-primary);
}

#copy-btn {
  margin-left: 0.5rem;
  padding: 6px;
  font-size: 1rem;
  border: none;
  background: var(--gradient-primary);
  color: white;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

#copy-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 16px rgba(138, 63, 252, 0.4);
}

#copy-btn svg {
  pointer-events: none;
}

#copy-feedback {
  margin-left: 0.5rem;
  color: var(--accent-secondary);
  display: none;
}

@media (max-width: 600px) {
  main {
    padding: 1rem;
  }

  .contact-container {
    padding: 2rem 1rem;
  }

  .icon-links {
    gap: 2rem;
  }

  .icon-links a {
    font-size: 2rem;
  }
}
  </style>
</head>
<body>

  <!-- Navigation -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">Pam Tholan</div>
      <nav id="nav-links">
        <a href="index.html">Home</a>
        <a href="casestudies.html">Case Studies</a>
        <a href="projects.html">Projects</a>
        <a href="portfolio_resume.html">Resume</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="hamburger" id="hamburger">&#9776;</div>
    </div>
  </header>

  <!-- Contact Section -->
  <main>
    <div class="contact-container">
      <h1>Let's Connect</h1>
      <p>Please reach out via email or LinkedIn.</p>

      <!-- Icon Links -->
<div class="icon-links">
  <a href="mailto:pamelatholan@yahoo.com?subject=Portfolio%20Contact" title="Email Me">
    <i class="fas fa-envelope"></i>
  </a>
  <a href="https://www.linkedin.com/in/pamela-tholan/" target="_blank" title="LinkedIn">
    <i class="fab fa-linkedin"></i>
  </a>
</div>

<div class="email-copy">
    If your email app doesn't open, copy this address:
<span id="email-text">pamelatholan@yahoo.com</span>
  <button id="copy-btn" aria-label="Copy email address">
    <!-- Clipboard SVG icon -->
    <svg xmlns="http://www.w3.org/2000/svg" height="20" width="20" fill="currentColor" viewBox="0 0 24 24" style="display:block;">
      <path d="M16 4h-2.586L12 2H8c-1.103 0-2 .897-2 2v2H4v14c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2V6c0-1.103-.897-2-2-2zM8 4h3.586L13 5.414 10.414 8H8V4zM18 20H6V8h12v12z"/>
    </svg>
  </button>
<span id="copy-feedback">Copied!</span>
</div>



    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Pam Tholan. All rights reserved.</p>
  </footer>

  <script>
    // Hamburger menu toggle
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("nav-links");

    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });
  </script>

  <script>
  const copyBtn = document.getElementById("copy-btn");
  const emailText = document.getElementById("email-text");
  const feedback = document.getElementById("copy-feedback");

  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(emailText.textContent)
      .then(() => {
        feedback.style.display = "inline";
        setTimeout(() => {
          feedback.style.display = "none";
        }, 2000);
      })
      .catch(() => {
        alert("Copy failed. Please copy manually.");
      });
  });
</script>


</body>
</html>
